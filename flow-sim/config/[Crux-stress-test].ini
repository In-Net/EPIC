[Crux-stress-test]
network = FlowNet
seed-set = 42
# sim-time-limit = 1s
# cpu-time-limit = 10s  # 限制CPU时间
debug-on-errors = true  # 出错时进入调试模式
# output-log = "output.log" # 输出日志文件

*.job_cnt = 1000
*.Mode = ${Mode=0,1,2,3}
#*.Mode = {2,3}
*.switch_limit = ${switch_limit=2}
#*.switch_limit = 10

# Fat-Tree参数
*.leaf_server_degree = 16
*.spine_leaf_degree = 16
*.spine_core_degree = 4
*.pod_cnt = 8
*.linkCapacity = 1e11 # 100G
*.gpusPerServer = 8
*.ScaleUpCapacity = 8e12 # 1TB = 8Tbps



# 任务参数
# GPT-3 175B on 512 GPUs
*.iterations = 1000